<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPM Area Coach Alignment</title>
    <!-- Tailwind CSS 4 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #F8F9FB; }
        .bento-card { transition: all 0.2s ease; }
        .bento-card:hover { border-color: #4F46E5; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Dependencies -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Firebase SDK -->
    <script type="text/babel">
        // Constants & Keys
        const firebaseConfig = {
            apiKey: "AIzaSyDIGLmJ5r_fBhB5xOL8oadQ7csN3wGh2dI",
            authDomain: "dpm-alignment.firebaseapp.com",
            projectId: "dpm-alignment",
            storageBucket: "dpm-alignment.firebasestorage.app",
            messagingSenderId: "298588092433",
            appId: "1:298588092433:web:694a9412658adac039d9b0"
        };
        const IMGBB_API_KEY = "b733862d15744e2bfaa4329d122f4ba0";

        // Initialize Firebase
        const app = firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore(app);

        // --- React Logic Starts Here ---
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [loading, setLoading] = useState(true);
            const [isEditing, setIsEditing] = useState(false);
            const [search, setSearch] = useState("");
            const [directors, setDirectors] = useState([]);
            const [coaches, setCoaches] = useState([]);
            const [stores, setStores] = useState([]);
            const [originalDirectors, setOriginalDirectors] = useState([]);
            const [originalCoaches, setOriginalCoaches] = useState([]);
            const [originalStores, setOriginalStores] = useState([]);
            const [showDiff, setShowDiff] = useState(false);
            const [showAddModal, setShowAddModal] = useState(null);
            const [editTarget, setEditTarget] = useState(null);
            const [detailModal, setDetailModal] = useState(null);
            const [showImportModal, setShowImportModal] = useState(false);
            const [importText, setImportText] = useState("");
            const [formData, setFormData] = useState({});
            const [selectedFile, setSelectedFile] = useState(null);
            const [dragItem, setDragItem] = useState(null);
            const STORE_TYPES = ["Fast Food", "C-Store", "Car Wash"];
            const STORE_NAMES = ["Paradise Quick Stop", "Burger King", "Subway", "Nashville", "Scarborough Car Wash", "Scarborough Travel Stop"];

            const sortByOrder = (items) => [...items].sort((a, b) => (a.order ?? Number.MAX_SAFE_INTEGER) - (b.order ?? Number.MAX_SAFE_INTEGER));
            const formatPhone = (raw = "") => {
                const digits = raw.replace(/\D/g, "").slice(0, 10);
                if (digits.length <= 3) return digits;
                if (digits.length <= 6) return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
                return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
            };

            // Load Data
            useEffect(() => {
                const unsubD = db.collection("directors").onSnapshot((s) => {
                    const data = sortByOrder(s.docs.map(d => ({id: d.id, ...d.data()})));
                    setDirectors(data);
                    setOriginalDirectors(data);
                });
                const unsubC = db.collection("coaches").onSnapshot((s) => {
                    const data = sortByOrder(s.docs.map(d => ({id: d.id, ...d.data()})));
                    setCoaches(data);
                    setOriginalCoaches(data);
                });
                const unsubS = db.collection("stores").onSnapshot((s) => {
                    const data = sortByOrder(s.docs.map(d => ({id: d.id, ...d.data()})));
                    setStores(data);
                    setOriginalStores(data);
                    setLoading(false);
                });
                return () => { unsubD(); unsubC(); unsubS(); };
            }, []);

            const uploadImage = async (file) => {
                const body = new FormData();
                body.append("image", file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body });
                const json = await res.json();
                return json.success ? json.data.url : null;
            };

            const handleAdd = async (e) => {
                e.preventDefault();
                setLoading(true);
                try {
                    let finalData = { ...formData };
                    if (selectedFile) {
                        const url = await uploadImage(selectedFile);
                        if (url) finalData.profilePic = url;
                    }

                    const coll = showAddModal === 'director' ? 'directors' : showAddModal === 'coach' ? 'coaches' : 'stores';
                    if (editTarget?.id) {
                        await db.collection(coll).doc(editTarget.id).set(finalData, { merge: true });
                    } else {
                        const newId = Math.random().toString(36).substr(2, 9);
                        if (showAddModal === 'director') finalData.order = directors.length;
                        if (showAddModal === 'coach') finalData.order = coaches.length;
                        if (showAddModal === 'store') finalData.order = stores.length;
                        await db.collection(coll).doc(newId).set(finalData);
                    }
                    setEditTarget(null);
                    setShowAddModal(null); setFormData({}); setSelectedFile(null);
                } catch (err) { console.error(err); } finally { setLoading(false); }
            };

            const handleStartEdit = (type, record) => {
                setShowAddModal(type);
                setEditTarget({ id: record.id });
                setFormData({
                    firstName: record.firstName || "",
                    lastName: record.lastName || "",
                    phone: (record.phone || "").replace(/\D/g, "").slice(0, 10),
                    email: record.email || "",
                    name: record.name || "",
                    type: record.type || "Fast Food",
                    streetAddress: record.streetAddress || record.address || "",
                    city: record.city || "",
                    stateCode: (record.stateCode || "").toUpperCase().slice(0, 2),
                    zipCode: record.zipCode || "",
                    storeNumber: record.storeNumber || "",
                    coachId: record.coachId || "",
                    profilePic: record.profilePic || ""
                });
            };

            const closeModal = () => {
                setShowAddModal(null);
                setEditTarget(null);
                setFormData({});
                setSelectedFile(null);
            };

            const reorderList = (items, draggedId, targetId) => {
                const copy = [...items];
                const from = copy.findIndex(item => item.id === draggedId);
                const to = copy.findIndex(item => item.id === targetId);
                if (from < 0 || to < 0 || from === to) return copy;
                const [moved] = copy.splice(from, 1);
                copy.splice(to, 0, moved);
                return copy.map((item, idx) => ({ ...item, order: idx }));
            };

            const handleDropOnItem = (type, targetId) => {
                if (!dragItem || dragItem.type !== type || !isEditing) return;
                if (type === 'director') setDirectors(prev => reorderList(prev, dragItem.id, targetId));
                if (type === 'coach') setCoaches(prev => reorderList(prev, dragItem.id, targetId));
                setDragItem(null);
            };

            const assignStoreToCoach = (storeId, coachId) => {
                if (!isEditing) return;
                setStores(prev => prev.map(s => s.id === storeId ? { ...s, coachId } : s));
                setDragItem(null);
            };

            const assignCoachToDirector = (coachId, directorId) => {
                if (!isEditing) return;
                setCoaches(prev => prev.map(c => c.id === coachId ? { ...c, directorId } : c));
                setDragItem(null);
            };

            const parseStoreImport = (text) => {
                const rows = text.split("\n").map(r => r.trim()).filter(Boolean);
                if (!rows.length) return [];

                try {
                    const parsedJson = JSON.parse(text);
                    if (Array.isArray(parsedJson)) return parsedJson;
                } catch (_) {}

                const delim = rows[0].includes("\t") ? "\t" : rows[0].includes("|") ? "|" : ",";
                const headerParts = rows[0].split(delim).map(h => h.trim().toLowerCase());
                const hasHeader = headerParts.some(h => ["type", "name", "store", "store number", "number", "street", "city", "state", "zip", "phone", "coach"].includes(h));
                const dataRows = hasHeader ? rows.slice(1) : rows;

                return dataRows.map((line) => {
                    const parts = line.split(delim).map(p => p.trim());
                    const get = (possibleKeys, fallbackIndex) => {
                        if (!hasHeader) return parts[fallbackIndex] || "";
                        const idx = headerParts.findIndex(h => possibleKeys.includes(h));
                        return idx >= 0 ? (parts[idx] || "") : "";
                    };
                    return {
                        type: get(["type"], 0) || "Fast Food",
                        name: get(["name", "store name", "store"], 1),
                        storeNumber: get(["store number", "number", "store #"], 2),
                        streetAddress: get(["street address", "street", "address"], 3),
                        city: get(["city"], 4),
                        stateCode: get(["state", "state code"], 5).replace(/[^a-zA-Z]/g, "").toUpperCase().slice(0, 2),
                        zipCode: get(["zip", "zip code"], 6),
                        phone: get(["phone", "phone number"], 7).replace(/\D/g, "").slice(0, 10),
                        coachName: get(["coach", "area coach", "coach name"], 8)
                    };
                }).filter(item => item.name || item.storeNumber || item.streetAddress);
            };

            const handleMassImport = async () => {
                const parsedStores = parseStoreImport(importText);
                if (!parsedStores.length) {
                    alert("No importable rows found. Use JSON array, CSV, TSV, or | separated rows.");
                    return;
                }
                setLoading(true);
                try {
                    const batch = db.batch();
                    parsedStores.forEach((store, idx) => {
                        const coachMatch = coaches.find(c => `${c.firstName || ""} ${c.lastName || ""}`.trim().toLowerCase() === (store.coachName || "").toLowerCase());
                        const newId = Math.random().toString(36).substr(2, 9);
                        batch.set(db.collection("stores").doc(newId), {
                            type: store.type || "Fast Food",
                            name: store.name || "",
                            storeNumber: store.storeNumber || "",
                            streetAddress: store.streetAddress || "",
                            city: store.city || "",
                            stateCode: (store.stateCode || "").toUpperCase().slice(0, 2),
                            zipCode: store.zipCode || "",
                            phone: (store.phone || "").replace(/\D/g, "").slice(0, 10),
                            coachId: coachMatch?.id || null,
                            order: stores.length + idx
                        }, { merge: true });
                    });
                    await batch.commit();
                    setImportText("");
                    setShowImportModal(false);
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const saveChanges = async () => {
                setLoading(true);
                const batch = db.batch();
                directors.forEach((d, index) => {
                    const orig = originalDirectors.find(od => od.id === d.id);
                    if ((orig?.order ?? null) !== index) batch.update(db.collection("directors").doc(d.id), { order: index });
                });
                coaches.forEach(c => {
                    const orig = originalCoaches.find(oc => oc.id === c.id);
                    const patch = {};
                    if (orig?.directorId !== c.directorId) patch.directorId = c.directorId || null;
                    if ((orig?.order ?? null) !== (c.order ?? null)) patch.order = c.order ?? null;
                    if (Object.keys(patch).length) batch.update(db.collection("coaches").doc(c.id), patch);
                });
                stores.forEach(s => {
                    const orig = originalStores.find(os => os.id === s.id);
                    if (orig?.coachId !== s.coachId) batch.update(db.collection("stores").doc(s.id), { coachId: s.coachId || null });
                });
                await batch.commit();
                setIsEditing(false); setShowDiff(false); setLoading(false);
            };

            const coachesByDirector = useMemo(() => {
                const map = {};
                coaches.forEach((coach) => {
                    const key = coach.directorId || "unassigned";
                    if (!map[key]) map[key] = [];
                    map[key].push(coach);
                });
                return map;
            }, [coaches]);

            const storesByCoach = useMemo(() => {
                const map = {};
                stores.forEach((store) => {
                    const key = store.coachId || "unassigned";
                    if (!map[key]) map[key] = [];
                    map[key].push(store);
                });
                return map;
            }, [stores]);

            const viewCategories = [
                { key: "C-Store", label: "Convenience Stores" },
                { key: "Fast Food", label: "Fast Food Restaurants" },
                { key: "Car Wash", label: "Car Washes" }
            ];

            // Simplified UI for Single File Demo
            return (
                <div className="min-h-screen p-8">
                    <header className="flex justify-between items-center mb-8 bg-white p-6 rounded-2xl border border-gray-200">
                        <div>
                            <h1 className="text-2xl font-black text-gray-900 uppercase tracking-tight">DPM Area Coach Alignment</h1>
                            <p className="text-xs font-bold text-gray-400 uppercase tracking-widest mt-1">{isEditing ? 'Editing Mode' : 'View Mode'}</p>
                        </div>
                        <div className="flex gap-4">
                            <input 
                                placeholder="Search..." 
                                className="px-4 py-2 bg-gray-100 rounded-xl border-none text-sm"
                                onChange={(e) => setSearch(e.target.value.toLowerCase())}
                            />
                            <button 
                                onClick={() => isEditing ? saveChanges() : setIsEditing(true)}
                                className={`px-6 py-2 rounded-xl font-bold text-sm transition-all ${isEditing ? 'bg-indigo-600 text-white' : 'bg-white border border-gray-200'}`}
                            >
                                {isEditing ? 'Save Changes' : 'Enter Edit Mode'}
                            </button>
                        </div>
                    </header>

                    {!isEditing && (
                        <main className="bg-white border-2 border-gray-800 rounded-sm">
                            <div className="p-6 border-b-2 border-gray-800 text-center">
                                <h2 className="text-3xl font-black tracking-tight text-indigo-800">DPM</h2>
                                <p className="text-xl font-semibold tracking-wide text-red-700 uppercase">Dossani Paradise Management</p>
                                <p className="text-sm font-bold mt-3">Total Locations <span className="ml-3">{stores.length}</span></p>
                            </div>

                            {viewCategories.map((category) => {
                                const typeStores = stores.filter(s => (s.type || "").toLowerCase() === category.key.toLowerCase());
                                return (
                                    <section key={category.key} className="border-b-2 border-gray-800 last:border-b-0">
                                        <div className="flex items-center justify-between bg-slate-200 border-b border-gray-800 px-3 py-1">
                                            <h3 className="text-xs font-black uppercase">{category.label}</h3>
                                            <p className="text-xs font-black">Total # of {category.key === "Fast Food" ? "Restaurants" : category.key === "C-Store" ? "C-Stores" : "Car Washes"} Managed: {typeStores.length}</p>
                                        </div>
                                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 p-4">
                                            {directors.map((director) => (
                                                <div key={`${category.key}-${director.id}`} className="space-y-3">
                                                    {((coachesByDirector[director.id] || []).filter(c => (storesByCoach[c.id] || []).some(s => (s.type || "").toLowerCase() === category.key.toLowerCase()))).map((coach) => {
                                                        const coachStores = (storesByCoach[coach.id] || []).filter(s => (s.type || "").toLowerCase() === category.key.toLowerCase());
                                                        return (
                                                            <div key={coach.id} className="text-xs">
                                                                <div className="flex justify-between bg-slate-300 border border-gray-800 px-2 py-1 font-black">
                                                                    <span>{coach.firstName} {coach.lastName}</span>
                                                                    <span>{coachStores.length}</span>
                                                                </div>
                                                                <div className="space-y-1 p-1">
                                                                    {coachStores.map((store) => (
                                                                        <p key={store.id}>{store.name} {store.storeNumber ? `#${store.storeNumber}` : ""}</p>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                );
                            })}
                        </main>
                    )}

                    {isEditing && <main className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        {/* Directors */}
                        <section className="space-y-4 bg-indigo-50/30 p-6 rounded-3xl border border-indigo-100/50 max-h-[70vh] overflow-y-auto">
                            <h2 className="text-[10px] font-black uppercase tracking-widest text-indigo-400 mb-4">Division Directors</h2>
                            {directors.map(d => (
                                <div key={d.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 cursor-pointer" draggable={isEditing} onDragStart={() => setDragItem({ type: 'director', id: d.id })} onDragOver={(e) => e.preventDefault()} onDrop={() => dragItem?.type === 'coach' ? assignCoachToDirector(dragItem.id, d.id) : handleDropOnItem('director', d.id)} onClick={() => setDetailModal({ type: 'director', id: d.id })}>
                                    <div className="flex items-center gap-3">
                                        <img src={d.profilePic || 'https://via.placeholder.com/150'} className="w-12 h-12 rounded-full object-cover" />
                                        <div>
                                            <p className="font-bold text-gray-900">{d.firstName} {d.lastName}</p>
                                            <p className="text-[10px] text-gray-400 uppercase font-black">{d.phone ? formatPhone(d.phone) : 'No Phone'}</p>
                                            <p className="text-[10px] text-gray-500">{d.email || 'No Email'}</p>
                                        </div>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); handleStartEdit('director', d); }} className="mt-3 text-[10px] font-bold uppercase text-indigo-500 hover:text-indigo-700">Edit</button>
                                </div>
                            ))}
                            {isEditing && <button onClick={() => { setEditTarget(null); setFormData({}); setSelectedFile(null); setShowAddModal('director'); }} className="w-full py-3 border-2 border-dashed border-indigo-200 rounded-2xl text-indigo-400 font-bold text-xs uppercase hover:bg-white">+</button>}
                        </section>

                        {/* Coaches */}
                        <section className="space-y-4 bg-purple-50/30 p-6 rounded-3xl border border-purple-100/50 max-h-[70vh] overflow-y-auto">
                            <h2 className="text-[10px] font-black uppercase tracking-widest text-purple-400 mb-4">Area Coaches</h2>
                            {coaches.map(c => (
                                <div key={c.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 bento-card cursor-pointer" draggable={isEditing} onDragStart={() => setDragItem({ type: 'coach', id: c.id })} onDragOver={(e) => e.preventDefault()} onDrop={() => dragItem?.type === 'store' ? assignStoreToCoach(dragItem.id, c.id) : handleDropOnItem('coach', c.id)} onClick={() => setDetailModal({ type: 'coach', id: c.id })}>
                                    <div className="flex items-center gap-3">
                                        <img src={c.profilePic || 'https://via.placeholder.com/150'} className="w-10 h-10 rounded-full object-cover" />
                                        <div>
                                            <p className="text-sm font-bold text-gray-900">{c.firstName} {c.lastName}</p>
                                            <p className="text-[9px] text-gray-400 font-bold">{c.phone ? formatPhone(c.phone) : 'No Phone'}</p>
                                            <p className="text-[10px] text-gray-500">{c.email || 'No Email'}</p>
                                            <p className="text-[10px] text-purple-500 font-bold mt-1">Stores: {stores.filter(s => s.coachId === c.id).length}</p>
                                        </div>
                                    </div>
                                    <button onClick={(e) => { e.stopPropagation(); handleStartEdit('coach', c); }} className="mt-3 text-[10px] font-bold uppercase text-purple-500 hover:text-purple-700">Edit</button>
                                </div>
                            ))}
                            {isEditing && <button onClick={() => { setEditTarget(null); setFormData({}); setSelectedFile(null); setShowAddModal('coach'); }} className="w-full py-3 border-2 border-dashed border-purple-200 rounded-2xl text-purple-400 font-bold text-xs uppercase hover:bg-white">+</button>}
                        </section>

                        {/* Stores */}
                        <section className="space-y-4 bg-emerald-50/30 p-6 rounded-3xl border border-emerald-100/50 max-h-[70vh] overflow-y-auto">
                            <div className="flex justify-between items-center mb-4">
                                <h2 className="text-[10px] font-black uppercase tracking-widest text-emerald-400">Managed Stores</h2>
                                {isEditing && <button onClick={() => setShowImportModal(true)} className="px-3 py-2 rounded-lg border border-emerald-200 text-[10px] font-bold uppercase text-emerald-600 hover:bg-white">Mass Import</button>}
                            </div>
                            {stores.map(s => (
                                <div key={s.id} className="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 bento-card" draggable={isEditing} onDragStart={() => setDragItem({ type: 'store', id: s.id })}>
                                    <p className="text-sm font-bold text-gray-900">{s.name}</p>
                                    <p className="text-[10px] text-emerald-500 font-bold mt-1">Type: {s.type || "N/A"}</p>
                                    <p className="text-[10px] text-emerald-700 font-bold mt-1">Store #: {s.storeNumber || 'N/A'}</p>
                                    <p className="text-[10px] text-emerald-600 font-bold italic opacity-70 mt-1">{s.streetAddress || s.address}, {s.city}, {(s.stateCode || "").toUpperCase()} {s.zipCode}</p>
                                    <p className="text-[10px] text-gray-500 mt-1">Phone: {s.phone ? formatPhone(s.phone) : "No Phone"}</p>
                                    <p className="text-[10px] text-gray-500 mt-1">Coach: {coaches.find(c => c.id === s.coachId)?.firstName || 'Unassigned'}</p>
                                    <button onClick={() => handleStartEdit('store', s)} className="mt-3 text-[10px] font-bold uppercase text-emerald-500 hover:text-emerald-700">Edit</button>
                                </div>
                            ))}
                            {isEditing && <button onClick={() => { setEditTarget(null); setFormData({}); setSelectedFile(null); setShowAddModal('store'); }} className="w-full py-3 border-2 border-dashed border-emerald-200 rounded-2xl text-emerald-400 font-bold text-xs uppercase hover:bg-white">+</button>}
                        </section>
                    </main>}

                    {/* Simple Add Modal */}
                    {showAddModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/50">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-md">
                                <h3 className="text-xl font-bold mb-4 uppercase">{editTarget ? `Edit ${showAddModal}` : `New ${showAddModal}`}</h3>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    {showAddModal !== 'store' && (
                                        <>
                                            <input placeholder="First Name" required className="w-full p-3 bg-gray-100 rounded-xl" value={formData.firstName || ""} onChange={e => setFormData({...formData, firstName: e.target.value})} />
                                            <input placeholder="Last Name" required className="w-full p-3 bg-gray-100 rounded-xl" value={formData.lastName || ""} onChange={e => setFormData({...formData, lastName: e.target.value})} />
                                            <input placeholder="Phone" className="w-full p-3 bg-gray-100 rounded-xl" value={formatPhone(formData.phone || "")} onChange={e => setFormData({...formData, phone: e.target.value.replace(/\D/g, "").slice(0, 10)})} />
                                        </>
                                    )}
                                    {(showAddModal === 'director' || showAddModal === 'coach') && (
                                        <input type="email" placeholder="Email Address" className="w-full p-3 bg-gray-100 rounded-xl" value={formData.email || ""} onChange={e => setFormData({...formData, email: e.target.value})} />
                                    )}
                                    {showAddModal === 'store' && (
                                        <>
                                            <select className="w-full p-3 bg-gray-100 rounded-xl" value={formData.type || "Fast Food"} onChange={e => setFormData({...formData, type: e.target.value})}>
                                                {STORE_TYPES.map(t => <option key={t} value={t}>{t}</option>)}
                                            </select>
                                            <select required className="w-full p-3 bg-gray-100 rounded-xl" value={formData.name || ""} onChange={e => setFormData({...formData, name: e.target.value})}>
                                                <option value="">Select Store Name</option>
                                                {STORE_NAMES.map(n => <option key={n} value={n}>{n}</option>)}
                                            </select>
                                            <input placeholder="Store Number" className="w-full p-3 bg-gray-100 rounded-xl" value={formData.storeNumber || ""} onChange={e => setFormData({...formData, storeNumber: e.target.value})} />
                                            <input placeholder="Street Address" required className="w-full p-3 bg-gray-100 rounded-xl" value={formData.streetAddress || ""} onChange={e => setFormData({...formData, streetAddress: e.target.value})} />
                                            <input placeholder="City" required className="w-full p-3 bg-gray-100 rounded-xl" value={formData.city || ""} onChange={e => setFormData({...formData, city: e.target.value})} />
                                            <input placeholder="State (2-letter)" required className="w-full p-3 bg-gray-100 rounded-xl uppercase" value={(formData.stateCode || "").toUpperCase()} onChange={e => setFormData({...formData, stateCode: e.target.value.replace(/[^a-zA-Z]/g, "").toUpperCase().slice(0, 2)})} />
                                            <input placeholder="Zip Code" required className="w-full p-3 bg-gray-100 rounded-xl" value={formData.zipCode || ""} onChange={e => setFormData({...formData, zipCode: e.target.value})} />
                                            <input placeholder="Phone" className="w-full p-3 bg-gray-100 rounded-xl" value={formatPhone(formData.phone || "")} onChange={e => setFormData({...formData, phone: e.target.value.replace(/\D/g, "").slice(0, 10)})} />
                                            <select className="w-full p-3 bg-gray-100 rounded-xl" value={formData.coachId || ""} onChange={e => setFormData({...formData, coachId: e.target.value})}>
                                                <option value="">Unassigned Coach</option>
                                                {coaches.map(c => <option key={c.id} value={c.id}>{c.firstName} {c.lastName}</option>)}
                                            </select>
                                        </>
                                    )}
                                    {showAddModal !== 'store' && <input type="file" className="text-xs" onChange={e => setSelectedFile(e.target.files[0])} />}
                                    <button className="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl shadow-lg">{editTarget ? "Save Changes" : "Create"}</button>
                                    <button type="button" onClick={closeModal} className="w-full text-gray-400 font-bold uppercase text-[10px]">Cancel</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {detailModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/50">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-lg">
                                {detailModal.type === 'director' && (
                                    <>
                                        <h3 className="text-xl font-bold mb-4 uppercase">Director Team</h3>
                                        <div className="space-y-2">
                                            {coaches.filter(c => c.directorId === detailModal.id).map(c => (
                                                <div key={c.id} className="p-3 rounded-xl bg-indigo-50">
                                                    <p className="font-bold text-sm">{c.firstName} {c.lastName}</p>
                                                    <p className="text-xs text-gray-500">{c.email || "No Email"} • {c.phone ? formatPhone(c.phone) : "No Phone"}</p>
                                                </div>
                                            ))}
                                            {!coaches.filter(c => c.directorId === detailModal.id).length && <p className="text-sm text-gray-400">No area coaches assigned.</p>}
                                        </div>
                                    </>
                                )}
                                {detailModal.type === 'coach' && (
                                    <>
                                        <h3 className="text-xl font-bold mb-4 uppercase">Coach Stores</h3>
                                        <div className="space-y-2">
                                            {stores.filter(s => s.coachId === detailModal.id).map(s => (
                                                <div key={s.id} className="p-3 rounded-xl bg-purple-50">
                                                    <p className="font-bold text-sm">{s.name} {s.storeNumber ? ` ${s.storeNumber}` : ""}</p>
                                                </div>
                                            ))}
                                            {!stores.filter(s => s.coachId === detailModal.id).length && <p className="text-sm text-gray-400">No stores assigned.</p>}
                                        </div>
                                    </>
                                )}
                                <button type="button" onClick={() => setDetailModal(null)} className="w-full mt-6 text-gray-500 font-bold uppercase text-xs">Close</button>
                            </div>
                        </div>
                    )}

                    {showImportModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center bg-gray-900/50">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-3xl">
                                <h3 className="text-xl font-bold mb-3 uppercase">Mass Import Stores</h3>
                                <p className="text-xs text-gray-500 mb-4">Paste JSON array or CSV/TSV/pipe rows in this order: type, name, storeNumber, streetAddress, city, stateCode, zipCode, phone, coachName.</p>
                                <textarea rows={12} className="w-full p-3 bg-gray-100 rounded-xl text-sm" value={importText} onChange={(e) => setImportText(e.target.value)} placeholder={`Fast Food,Burger King,26183,123 Main St,Dallas,TX,75001,4696607992,Jane Smith`} />
                                <div className="flex gap-3 mt-4">
                                    <button onClick={handleMassImport} className="px-5 py-3 bg-emerald-600 text-white rounded-xl font-bold text-sm">Import</button>
                                    <button onClick={() => setShowImportModal(false)} className="px-5 py-3 bg-gray-100 text-gray-600 rounded-xl font-bold text-sm">Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
